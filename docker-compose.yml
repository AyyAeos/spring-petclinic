services:
  pet-clinic:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: spring-pet-clinic-app
    image: spring-pet-clinic-app:v1
    ports:
      - "8081:8080"
    networks:
      - spring-pet-clinic-network
    environment:
      - MYSQL_URL=jdbc:mysql://mysql-db:3306/petclinic
      - MYSQL_DB=petclinic
      - MYSQL_USER=petclinic
      - MYSQL_PASS=petclinic
      - POSTGRES_DB=petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_PASS=petclinic
    depends_on:
      mysql-db:
        condition: service_healthy


  mysql-db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=petclinic
      - MYSQL_PASSWORD=petclinic
      - MYSQL_DATABASE=petclinic
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spring-pet-clinic-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
  
  postgres:
    image: postgres:18.3
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_PASSWORD=petclinic
      - POSTGRES_USER=petclinic
      - POSTGRES_DB=petclinic

networks:
  spring-pet-clinic-network:
    driver: bridge

volumes: 
  mysql_data:
